<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectCloud 学習コンテンツ</title>
<style>
  :root {
    --dc-blue: #0066CC;
    --dc-blue-dark: #004C99;
    --dc-blue-light: #E8F2FF;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: #F7F9FC;
    color: #1F2937;
    line-height: 1.7;
  }
  .header {
    background: linear-gradient(135deg, var(--dc-blue) 0%, var(--dc-blue-dark) 100%);
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
  }
  .header-label {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .header p { font-size: 14px; opacity: 0.85; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }
  .content-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid transparent;
  }
  .content-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    border-color: var(--dc-blue);
  }
  .content-icon {
    font-size: 40px;
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dc-blue-light);
    border-radius: 12px;
  }
  .content-info { flex: 1; }
  .content-info h2 { font-size: 17px; margin-bottom: 4px; color: var(--dc-blue-dark); }
  .content-info p { font-size: 13px; color: #6B7280; margin: 0; }
  .content-meta {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-blue { background: var(--dc-blue-light); color: var(--dc-blue); }
  .tag-green { background: #E6F9F2; color: #00A676; }
  .footer-note {
    text-align: center;
    font-size: 13px;
    color: #9CA3AF;
    margin-top: 40px;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-label">Learning Contents</div>
  <h1>DirectCloud 活用ガイド</h1>
  <p>DirectCloudの機能や運用を学べるインタラクティブなコンテンツ集</p>
</div>
<div class="container">

  <a href="/s/learning/file-sharing" target="_top" class="content-card">
    <div class="content-icon">&#128279;</div>
    <div class="content-info">
      <h2>ファイル共有方法の選び方</h2>
      <p>共有リンク・受取フォルダ・ゲスト招待の使い分けをシナリオクイズで学ぶ</p>
      <div class="content-meta">
        <span class="tag tag-blue">約5分</span>
        <span class="tag tag-green">クイズ5問</span>
      </div>
    </div>
  </a>

    <div class="content-icon">&#128274;</div>
    <div class="content-info">
      <h2>セキュリティ設定チェック</h2>
      <p>あなたの組織に最適なセキュリティ設定を診断</p>
      <div class="content-meta">
        <span class="tag tag-blue">約3分</span>
        <span class="tag tag-green">診断型</span>
      </div>
    </div>
  </a>
  -->

  <div class="footer-note">DirectCloud カスタマーサクセスチーム</div>
</div>
</body>
</html>
